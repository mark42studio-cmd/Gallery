<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="一圈畫廊" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />

    <!-- Standard icon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap"
      rel="stylesheet"
    />

    <title>一圈畫廊管理系統</title>

    <!-- Standalone mode: add safe-area padding on iOS when installed as PWA -->
    <script>
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
        document.documentElement.classList.add('pwa-standalone');
      }
    </script>

    <style>
      /* Extra top padding in PWA standalone mode to clear the iOS status bar */
      .pwa-standalone body {
        padding-top: env(safe-area-inset-top);
      }
    </style>
  </head>
  <body class="bg-paper font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
